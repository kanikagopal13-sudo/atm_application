<!DOCTYPE html>
<html>
<head>
    <title>ATM Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="signupPage" class="container">
    <h2>Sign Up</h2>

    <input type="text" id="signupUser" placeholder="Username">
    <input type="password" id="signupPass" placeholder="Password">
    <button onclick="signup()">Sign Up</button>

    <p>
        Already have an account?
        <a href="#" onclick="showLogin()">Login</a>
    </p>
</div>

<div id="loginPage" class="container hidden">
    <h2>Login</h2>

    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">
    <button onclick="login()">Login</button>

    <p>
        New User?
        <a href="#" onclick="showSignup()">Sign Up</a>
    </p>
</div>

<div id="atmPage" class="container hidden">
    <h2>ATM Dashboard</h2>

    <h3>Balance: ₹<span id="balance">0</span></h3>

    <input type="number" id="amount" placeholder="Enter Amount">

    <button onclick="deposit()">Deposit</button>
    <button onclick="withdraw()">Withdraw</button>
    <button onclick="logout()">Logout</button>
</div>

<script src="script.js"></script>
</body>
</html>
